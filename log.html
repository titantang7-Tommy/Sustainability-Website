<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics | SP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav><a href="index.html" class="logo">SP</a>
        <div class="nav-links"><a href="index.html">Home</a>
            <a href="mission.html">Mission</a><a href="calculator.html">Calculate</a>
            <a href="log.html" class="active">Analytics</a><a href="about.html">About</a>
            <a href="resources.html">Resources</a>
        </div></nav>
    <div class="card" style="max-width: 700px;">
        <h2>Weekly Usage Analytics</h2>
        <canvas id="energyChart"></canvas>
        <button class="btn-main" style="margin-top:20px; background:#1e293b; color:#fbbf24; border:1px solid #fbbf24;" onclick="localStorage.removeItem('energyLog'); location.reload();">RESET WEEK</button>
    </div>
    <script>
        const savedData = JSON.parse(localStorage.getItem('energyLog')) || [0,0,0,0,0,0,0];
        const ctx = document.getElementById('energyChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{ label: 'Usage (kWh)', data: savedData, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 3, tension: 0.4, fill: true },
                { label: '35kWh Target', data: [35, 35, 35, 35, 35, 35, 35], borderColor: '#fbbf24', borderDash: [5, 5], pointRadius: 0, fill: false }]
            },
            options: { scales: { y: { beginAtZero: true, title: { display: true, text: 'Energy (kWh)' } } } }
        });
    </script>




<footer>
        <p>&copy; 2026 Sustainability Project. Aligning with SDG 12: Responsible Consumption and Production.</p>
    </footer>
</body>
</html>
